# Medicaid genişlemesi (ACA) — hero dataset descriptor.
# Veri-agnostik çekirdek bunu RUNTIME'da yükler: kolon rolleri / treatment-kohort
# / FIPS-lookup burada; `pareto/` core hiçbir dataset adı/kolonu hardcode etmez.
# Not: temizleme agent'ı bunu keşif için ipucu olarak kullanır; merge deterministik.

dataset: medicaid
description: >
  ACA Medicaid genişlemesinin ilçe-yıl mortalitesine etkisi (DiD).
  Committed baseline: 2014-genişleme kohortu vs never-treated (2-grup,
  TWFE-geçerli, kohort makinesi gerektirmez). Fast-follow tam-örneklem + Callaway-Sant'Anna açar.

sources:
  cdc_mortality:
    file: raw/cdc_wonder_mortality_1999_2020.tsv
    format: tsv
    note: >
      CDC WONDER, Multiple Cause of Death, 1999-2020. Dosya sonunda "---" işaretinden
      sonra metadata footer'ı var (atlanmalı). Suppressed/Unreliable/Missing hücreler
      NA olarak ele alınır (DUA-uyumu; yeniden kurulmaz).
    read:
      sep: "\t"
      skipfooter_marker: "---"            # bu satırdan sonrası metadata
      keep_default_na: true
      na_markers: ["Suppressed", "Unreliable", "Missing", "Not Applicable"]
      dtype: { "County Code": str }        # FIPS leading-zero korunur (preserve_leading_zeros)
    columns:                                # kaynak_kolon -> rol
      county_fips: "County Code"            # 5-haneli ilçe FIPS
      county_name: "County"
      year: "Year Code"
      deaths: "Deaths"
      population: "Population"
      crude_rate: "Crude Rate"              # 100k başına ölüm

  kff_expansion:
    file: raw/kff_expansion_dates.csv
    format: csv
    note: KFF eyalet Medicaid genişleme tarihleri (gerçek; atıfla redistribute).
    columns:
      state_fips: "state_fips"              # 2-haneli
      state: "state"
      status: "status"                       # "Adopted" / "Not Adopted"
      implementation_date: "implementation_date"

merge:
  # ilçe FIPS'in ilk 2 hanesi = eyalet FIPS → KFF ile eşle (panel-merge)
  derive:
    state_fips: { from: county_fips, take_first: 2 }
  on: state_fips
  how: left

panel:                                       # CleanPanel manifest'e eşlenir
  unit: county_fips
  time: year
  outcome: [crude_rate]                      # birincil sonuç
  covariates: []                             # Census/ACS kontrolleri Sprint-2
  weight: population                         # nüfus-ağırlıklı (default)

treatment:
  cohort_from: implementation_date           # genişleme yılı = tedavi kohortu
  never_treated_when: { status: "Not Adopted" }
  committed_baseline:
    cohorts: [2014]
    control: never_treated

compliance:                                  # CDC WONDER DUA
  suppressed_as_na: true
  reidentification: forbidden
